<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Библиотека стилей</title>
    <style>
        body {
            font-family: 'Times New Roman', Times, serif;
            background-color: #f5f5f5;
            padding: 30px;
            color: #333;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            max-width: 600px;
            margin: 0 auto;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .section-title {
            font-weight: bold;
            font-size: 14px;
            margin-top: 20px;
            margin-bottom: 10px;
            color: #444;
        }
        
        .input-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }
        .input-field {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
            width: 160px;
            font-size: 13px;
        }
        .input-field:focus { border-color: #007bff; }
        .input-valid {
            border-color: #28a745;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="%2328a745" viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>') no-repeat right 8px center;
            background-size: 16px;
            padding-right: 30px;
        }
        .input-invalid {
            border-color: #dc3545;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="%23dc3545" viewBox="0 0 24 24"><path d="M19 6.4L17.6 5 12 10.6 6.4 5 5 6.4 10.6 12 5 17.6 6.4 19 12 13.4 17.6 19 19 17.6 13.4 12z"/></svg>') no-repeat right 8px center;
            background-size: 16px;
            padding-right: 30px;
        }

        .toggle-container {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .toggle-label {
            display: inline-flex;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
        }
        .toggle-input { display: none; }
        .toggle-switch {
            width: 40px;
            height: 20px;
            background-color: #ccc;
            border-radius: 20px;
            position: relative;
            margin-right: 8px;
            transition: background-color 0.3s;
        }
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 16px;
            height: 16px;
            background-color: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        .toggle-input:checked + .toggle-switch.green { background-color: #28a745; }
        .toggle-input:checked + .toggle-switch.pink { background-color: #e83e8c; }
        .toggle-input:checked + .toggle-switch::after { transform: translateX(20px); }

        .radio-container {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .radio-label { display: inline-flex; align-items: center; cursor: pointer; }
        .radio-input {
            appearance: none;
            width: 16px;
            height: 16px;
            border: 2px solid #ccc;
            border-radius: 50%;
            margin-right: 6px;
            position: relative;
            outline: none;
            cursor: pointer;
        }
        .radio-input:checked { border-color: #28a745; }
        .radio-input:checked::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 8px;
            height: 8px;
            background-color: #28a745;
            border-radius: 50%;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            align-items: center;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            color: white;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-success { background-color: #28a745; }
        .btn-success.hover-state, .btn-success:hover { background-color: #218838; }
        .btn-danger { background-color: #dc3545; }
        .btn-danger.hover-state, .btn-danger:hover { background-color: #c82333; }
        .btn-disabled { background-color: #6c757d; cursor: not-allowed; opacity: 0.65; }
        .btn-icon {
            width: 28px; height: 28px; padding: 0;
            border-radius: 50%;
            display: inline-flex; justify-content: center; align-items: center;
            font-size: 16px;
        }

        .custom-textarea {
            width: 100%;
            max-width: 450px;
            height: 80px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
            resize: vertical;
            font-size: 13px;
        }
        .custom-textarea:focus { border-color: #007bff; }
    </style>
</head>
<body>
    <div class="container"> 
        <div class="section-title">Inputs</div>
        <div class="input-group">
            <input type="text" class="input-field" placeholder="Placeholder text...">
            <input type="text" class="input-field input-valid" value="valid text">
            <input type="text" class="input-field input-invalid" value="invalid text">
        </div>

        <div class="section-title">Check boxes</div>
        <div class="toggle-container">
            <label class="toggle-label">
                <input type="checkbox" class="toggle-input" checked>
                <div class="toggle-switch green"></div> Subscribe
            </label>
            <label class="toggle-label">
                <input type="checkbox" class="toggle-input" checked>
                <div class="toggle-switch pink"></div> Subscribe
            </label>
        </div>

        <div class="section-title">Radio buttons</div>
        <div class="radio-container">
            <span>Gender:</span>
            <label class="radio-label">
                <input type="radio" name="gender" class="radio-input" checked> Male
            </label>
            <label class="radio-label">
                <input type="radio" name="gender" class="radio-input"> Female
            </label>
        </div>

        <div class="section-title">Buttons</div>
        <div class="button-group">
            <button class="btn btn-success">Active</button>
            <button class="btn btn-success hover-state">Hover</button>
            <button class="btn btn-danger">Danger</button>
            <button class="btn btn-danger hover-state">Hover</button>
            <button class="btn btn-disabled" disabled>Disabled</button>
            <button class="btn btn-success btn-icon">+</button>
            <button class="btn btn-danger btn-icon">x</button>
        </div>

        <div class="section-title">Text area</div>
        <textarea class="custom-textarea" placeholder="Placeholder text..."></textarea>
    </div>
</body>
</html>
